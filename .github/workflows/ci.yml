name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --index-url https://download.pytorch.org/whl/cpu torch
      - run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        torch-version: ["2.4.1", ""]  # floor and latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install torch (floor pin or latest)
        run: |
          if [ -n "${{ matrix.torch-version }}" ]; then
            pip install --index-url https://download.pytorch.org/whl/cpu "torch==${{ matrix.torch-version }}"
          else
            pip install --index-url https://download.pytorch.org/whl/cpu torch
          fi
      - run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest --cov=torchguard --cov-report=term-missing
